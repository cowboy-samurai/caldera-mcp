name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Verify import
        run: python -c "from caldera_mcp.server import mcp; print('import OK')"

      - name: Audit dependencies
        run: |
          pip install pip-audit
          pip-audit --project-path .
