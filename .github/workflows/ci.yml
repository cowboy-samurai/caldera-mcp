name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e .

      - name: Verify import
        run: python -c "from caldera_mcp.server import mcp; print('import OK')"

      - name: Audit dependencies
        run: |
          # Snapshot deps before pip-audit adds its own transitive packages
          pip freeze --exclude-editable > /tmp/pkg-requirements.txt
          pip install pip-audit
          # CVE-2025-69872: diskcache 5.6.3 is a transitive dep via fastmcp;
          # 5.6.3 is the latest release — no upstream fix available yet.
          pip-audit -r /tmp/pkg-requirements.txt --ignore-vuln CVE-2025-69872
